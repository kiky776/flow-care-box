<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Message 💌</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #fff7f9;
    text-align: center;
    padding: 50px;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    padding: 10px 20px;
    border: none;
    background: #d6336c;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="box">
    <h2>💌 You have a message</h2>
    <p>Rate your box to unlock your message</p>

    <!-- SIMPLE RATING -->
    <p>⭐ ⭐ ⭐ ⭐ ⭐</p>

    <button onclick="showMessage()">Unlock Message</button>

    <div id="message" class="hidden">
        <h3>💕 Surprise!</h3>
        <p>You are loved, appreciated, and deserve all the comfort in the world.</p>
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
